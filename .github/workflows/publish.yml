name: Multi-Registry Publish

on:
  push:
    tags: ["v*"] # Trigger on v1.0.7, etc.

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      
      - name: Install & Build
        run: |
          npm ci
          npm run build
          
      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          
      - name: Install & Build
        run: |
          npm ci
          npm run build
          
      - name: Publish to GitHub
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp:
    name: Publish to Docker MCP Registry
    needs: publish-npm # Depends on NPM publish completing first
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for GitHub OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      # The MCP tools usually pull the npx package dynamically.
      # We wait 30 seconds to allow the NPM registry to propagate the new version globally.
      - name: Wait for NPM Propagation
        run: sleep 30

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry via OIDC
        run: ./mcp-publisher login github-oidc

      - name: Dynamic Version Patch
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Publish to Registry
        run: ./mcp-publisher publish
