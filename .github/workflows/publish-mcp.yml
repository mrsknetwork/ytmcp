name: Build and Verify MCP

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          
      - name: Install dependencies
        run: npm ci

      - name: Run Tests (Verification)
        run: npm test --if-present

      - name: Build package
        run: npm run build
