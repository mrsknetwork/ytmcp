name: Bug Report
description: Create a report to help us improve the YouTube MCP Server
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide the exact steps to reproduce the issue. Include the tool name and arguments.
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP Client
      description: Which client are you using? (Claude Desktop, Cursor, Supernova, Custom, etc.)
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Docker
  - type: textarea
    id: logs
    attributes:
      label: Server Logs
      description: Please paste any relevant server logs or error messages (ensure you redact API keys and tokens!).
