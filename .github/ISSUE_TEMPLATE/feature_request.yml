name: Feature Request
description: Suggest an idea or new tool for the YouTube MCP Server
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share your idea!
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why do you need this feature? Describe the problem it solves.
    validations:
      required: true
  - type: textarea
    id: youtube_api
    attributes:
      label: YouTube API Endpoint (Optional)
      description: If you know which YouTube Data API v3 endpoint this feature would use, link it here.
