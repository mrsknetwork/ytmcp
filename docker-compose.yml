version: '3.8'

services:
  youtube-mcp:
    build: .
    stdin_open: true
    tty: true
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost:3000/oauth2callback
    volumes:
      - ./tokens.json:/app/tokens.json
    ports:
      - "3000:3000"
